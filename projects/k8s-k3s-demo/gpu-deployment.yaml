# GPU 资源声明示例：深度学习训练 Pod
#
# 对比 full-deployment.yaml，唯一的区别在 resources 部分加了 nvidia.com/gpu
# 这就是 K8s 原生管理 GPU 的核心机制

apiVersion: v1
kind: Pod
metadata:
  name: gpu-training
  labels:
    app: deep-learning
    task: training
spec:
  containers:
  - name: trainer
    image: nvcr.io/nvidia/pytorch:24.01-py3
    command: ["python", "-c", "import torch; print(f'CUDA available: {torch.cuda.is_available()}')"]
    resources:
      requests:
        cpu: "2"
        memory: "4Gi"
        nvidia.com/gpu: 1       # ← 请求 1 张 GPU
      limits:
        cpu: "4"
        memory: "8Gi"
        nvidia.com/gpu: 1       # ← 最多只能用 1 张 GPU
    env:
    - name: NVIDIA_VISIBLE_DEVICES
      value: "all"
    # volumeMounts:
    # - name: dataset
    #   mountPath: /data
    # volumes:
    # - name: dataset
    #   hostPath:
    #     path: /home/user/datasets
---
# --- 下面是 Deployment 版本（生产用）---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-inference
  labels:
    app: gpu-inference
spec:
  replicas: 2                   # K8s 会尝试调度到不同的 GPU 节点
  selector:
    matchLabels:
      app: gpu-inference
  template:
    metadata:
      labels:
        app: gpu-inference
    spec:
      containers:
      - name: inference
        image: nvcr.io/nvidia/pytorch:24.01-py3
        command: ["python", "-u", "serve.py"]
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
            nvidia.com/gpu: 1   # 每个 Pod 要 1 张 GPU
          limits:
            cpu: "2"
            memory: "4Gi"
            nvidia.com/gpu: 1   # 不能超过 1 张
